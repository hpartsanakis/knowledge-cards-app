<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Cards App</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#222222">

  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>

<body>
  <header class="app-header">
    <h1>Knowledge Cards</h1>

    <div class="controls">
      <input
        type="text"
        id="searchInput"
        placeholder="Search cards..."
      >

      <select id="sortSelect">
        <option value="az">Title A–Z</option>
        <option value="za">Title Z–A</option>
        <option value="newest">Newest</option>
        <option value="category">Category</option>
      </select>

      <button id="addCardBtn">+ Add Card</button>

      <button id="installBtn" style="display: none;">
        📱 Install App
      </button>
    </div>
  </header>

  <section class="collections-bar">
    <button class="collection-btn active" data-collection="photos">
      📸 Photo Moments
    </button>

    <button class="collection-btn" data-collection="recipes">
      🍳 Recipes
    </button>

    <button class="collection-btn" data-collection="travel">
      ✈️ Travel Destinations
    </button>
  </section>

  <main
    class="cards-container"
    id="cardsContainer"
  ></main>

  <div class="modal hidden" id="cardModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add New Card</h2>

        <button
          type="button"
          class="close-btn"
          id="closeModalBtn"
        >
          ×
        </button>
      </div>

      <form id="cardForm">
        <div class="form-group">
          <label for="categoryInput">Category</label>
          <input type="text" id="categoryInput" required>
        </div>

        <div class="form-group">
          <label for="titleInput">Title</label>
          <input type="text" id="titleInput" required>
        </div>

        <div class="form-group">
          <label for="contentInput">Content</label>
          <textarea id="contentInput" rows="5" required></textarea>
        </div>

        <div class="form-group">
          <label for="imageInput">Photo</label>
          <input type="file" id="imageInput" accept="image/*">
        </div>

        <button
          type="submit"
          class="submit-btn"
        >
          Save Card
        </button>
      </form>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
